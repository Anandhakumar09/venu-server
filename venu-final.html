<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<title>Venu — Chat & Calls</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#fafafa;--surface:#ffffff;--border:#efefef;
  --text:#0a0a0a;--sub:#8e8e8e;
  --accent:#0095f6;--accent2:#833ab4;
  --danger:#ed4956;--green:#00c06b;--warn:#f59e0b;
  --shadow:0 2px 20px rgba(0,0,0,.07);
}
html,body{height:100%;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);overflow:hidden;}

/* SCREENS */
.screen{display:none;height:100%;flex-direction:column;}
.screen.active{display:flex;}

/* ═══════════════════════════════════════════
   LOGIN
══════════════════════════════════════════════*/
#loginScreen{align-items:center;justify-content:center;padding:32px 24px;background:var(--surface);}
.login-logo{font-family:'Playfair Display',serif;font-size:46px;background:linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px;text-align:center;}
.login-sub{color:var(--sub);font-size:12px;text-align:center;margin-bottom:40px;letter-spacing:.3px;}
.login-card{width:100%;max-width:360px;display:flex;flex-direction:column;gap:14px;}
.field label{display:block;font-size:11px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.field input{width:100%;padding:14px 16px;border:1.5px solid var(--border);border-radius:12px;font-family:'DM Sans',sans-serif;font-size:15px;background:var(--bg);outline:none;transition:border-color .2s;color:var(--text);}
.field input:focus{border-color:var(--accent);}
.btn-grad{width:100%;padding:15px;background:linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045);border:none;border-radius:12px;color:#fff;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .2s;}
.btn-grad:active{opacity:.85;}
.err{color:var(--danger);font-size:12px;text-align:center;min-height:16px;}

/* ═══════════════════════════════════════════
   HOME
══════════════════════════════════════════════*/
#homeScreen{background:var(--surface);}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;border-bottom:1px solid var(--border);}
.topbar-title{font-family:'Playfair Display',serif;font-size:24px;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.avatar-btn{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#833ab4,#fcb045);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;cursor:pointer;border:none;flex-shrink:0;}
.logout-btn{padding:6px 12px;background:transparent;border:1.5px solid var(--border);border-radius:20px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;color:var(--sub);cursor:pointer;transition:all .2s;}
.logout-btn:hover{border-color:var(--danger);color:var(--danger);}

.search-box{padding:12px 16px;}
.search-row{display:flex;align-items:center;background:var(--bg);border-radius:12px;padding:0 14px;gap:10px;}
.search-row svg{flex-shrink:0;color:var(--sub);}
.search-row input{flex:1;border:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:14px;padding:11px 0;outline:none;color:var(--text);}
.find-btn{padding:9px 16px;background:var(--accent);border:none;border-radius:10px;color:#fff;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;}

.found-card{margin:0 16px 8px;padding:14px 16px;background:var(--bg);border-radius:14px;display:none;align-items:center;gap:12px;}
.found-card.show{display:flex;}
.fa-av{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#833ab4,#fd1d1d);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:17px;flex-shrink:0;}
.fa-info{flex:1;}
.fa-name{font-weight:600;font-size:14px;}
.fa-phone{font-size:12px;color:var(--sub);}
.fa-status{font-size:11px;font-weight:600;margin-top:2px;}
.fa-status.on{color:var(--green);}
.fa-status.off{color:var(--sub);}
.chat-btn{padding:8px 16px;background:var(--accent);border:none;border-radius:10px;color:#fff;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;}

.sec-title{padding:12px 20px 6px;font-size:11px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;}
.chat-list{flex:1;overflow-y:auto;}
.chat-item{display:flex;align-items:center;gap:13px;padding:13px 20px;cursor:pointer;transition:background .12s;position:relative;}
.chat-item:active{background:var(--bg);}
.ci-av{width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,#0095f6,#833ab4);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:18px;flex-shrink:0;position:relative;}
.ci-dot{position:absolute;bottom:1px;right:1px;width:13px;height:13px;border-radius:50%;background:var(--green);border:2.5px solid var(--surface);}
.ci-info{flex:1;min-width:0;}
.ci-name{font-weight:600;font-size:14px;}
.ci-last{font-size:12px;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.ci-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
.ci-time{font-size:10px;color:var(--sub);}
.unread{background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;}
.empty-st{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--sub);padding:40px;}
.empty-st svg{opacity:.2;}
.empty-st p{font-size:13px;text-align:center;line-height:1.6;}

/* ═══════════════════════════════════════════
   CHAT SCREEN
══════════════════════════════════════════════*/
#chatScreen{background:var(--bg);}
.chat-topbar{display:flex;align-items:center;gap:11px;padding:12px 14px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
.back-btn{width:34px;height:34px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;cursor:pointer;border-radius:50%;}
.ct-av{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#fd1d1d,#fcb045);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;flex-shrink:0;}
.ct-info{flex:1;}
.ct-name{font-weight:600;font-size:15px;}
.ct-status{font-size:11px;color:var(--sub);}
.ct-status.on{color:var(--green);}
.call-btns{display:flex;gap:7px;}
.cbtn{width:36px;height:36px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.cbtn.vc{background:#e8f5e9;color:#2e7d32;}
.cbtn.vid{background:#e3f2fd;color:#1565c0;}
.cbtn:active{opacity:.7;}

.enc-bar{display:flex;align-items:center;justify-content:center;gap:6px;padding:5px;background:#f0faf5;border-bottom:1px solid #d4edda;font-size:10px;color:#2e7d32;font-weight:500;flex-shrink:0;}

.messages{flex:1;overflow-y:auto;padding:14px 14px 8px;display:flex;flex-direction:column;gap:5px;}
.msg-wrap{display:flex;flex-direction:column;}
.msg-wrap.me{align-items:flex-end;}
.msg-wrap.them{align-items:flex-start;}
.bubble{max-width:78%;padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.45;word-break:break-word;animation:popIn .15s ease;}
@keyframes popIn{from{transform:scale(.96) translateY(4px);opacity:0;}to{transform:scale(1) translateY(0);opacity:1;}}
.msg-wrap.me .bubble{background:linear-gradient(135deg,#833ab4,#fd1d1d);color:#fff;border-bottom-right-radius:4px;}
.msg-wrap.them .bubble{background:var(--surface);color:var(--text);border-bottom-left-radius:4px;box-shadow:var(--shadow);}
.msg-meta{font-size:10px;color:var(--sub);margin-top:3px;padding:0 4px;display:flex;align-items:center;gap:4px;}
.tick{font-size:12px;}

.typing-wrap{display:none;align-items:center;gap:5px;padding:10px 14px;background:var(--surface);border-radius:18px;border-bottom-left-radius:4px;width:fit-content;box-shadow:var(--shadow);}
.typing-wrap.show{display:flex;}
.td{width:7px;height:7px;border-radius:50%;background:var(--sub);animation:td .9s infinite;}
.td:nth-child(2){animation-delay:.15s;}.td:nth-child(3){animation-delay:.3s;}
@keyframes td{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-5px);}}

.input-bar{display:flex;align-items:center;gap:9px;padding:10px 12px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0;}
.msg-inp{flex:1;border:1.5px solid var(--border);border-radius:22px;padding:10px 15px;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;resize:none;max-height:100px;transition:border-color .2s;background:var(--bg);color:var(--text);}
.msg-inp:focus{border-color:var(--accent);}
.send-btn{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#833ab4,#fd1d1d);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.send-btn:active{opacity:.75;}

/* ═══════════════════════════════════════════
   CALL SCREEN (Full screen overlay)
══════════════════════════════════════════════*/
#callScreen{position:fixed;inset:0;z-index:100;display:none;flex-direction:column;align-items:center;justify-content:space-between;padding:60px 24px 50px;background:linear-gradient(160deg,#1a0533,#0d1b2a);}
#callScreen.show{display:flex;}
#remoteVideo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none;}
#localVideo{position:absolute;top:56px;right:16px;width:100px;height:140px;object-fit:cover;border-radius:14px;border:2px solid rgba(255,255,255,.3);z-index:2;display:none;background:#000;}
.call-top{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:14px;width:100%;}
.call-av{width:96px;height:96px;border-radius:50%;background:linear-gradient(135deg,#833ab4,#fd1d1d);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:34px;}
.call-name{color:#fff;font-size:22px;font-weight:600;}
.call-st{color:rgba(255,255,255,.6);font-size:14px;}
.call-timer{color:rgba(255,255,255,.85);font-size:17px;font-weight:500;font-variant-numeric:tabular-nums;letter-spacing:.5px;display:none;}
.call-type-badge{background:rgba(255,255,255,.15);padding:4px 14px;border-radius:20px;font-size:11px;color:rgba(255,255,255,.8);}

.call-ctrl{position:relative;z-index:1;display:flex;gap:20px;align-items:center;flex-wrap:wrap;justify-content:center;}
.cc{width:58px;height:58px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .15s;}
.cc:active{transform:scale(.9);}
.cc.mute,.cc.cam,.cc.spk{background:rgba(255,255,255,.18);color:#fff;}
.cc.mute.on,.cc.cam.on,.cc.spk.on{background:#fff;color:#111;}
.cc.end{background:var(--danger);color:#fff;width:66px;height:66px;}

/* ═══════════════════════════════════════════
   INCOMING CALL
══════════════════════════════════════════════*/
#incomingPanel{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.8);backdrop-filter:blur(12px);}
#incomingPanel.show{display:flex;}
.ic-card{background:var(--surface);border-radius:28px;padding:30px 24px;display:flex;flex-direction:column;align-items:center;gap:14px;width:290px;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.ic-type{font-size:11px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;}
.ic-av{width:70px;height:70px;border-radius:50%;background:linear-gradient(135deg,#0095f6,#833ab4);display:flex;align-items:center;justify-content:center;color:#fff;font-size:25px;font-weight:700;}
.ic-name{font-size:19px;font-weight:700;}
.ic-pulse{color:var(--sub);font-size:12px;animation:pulse 1.2s infinite;}
@keyframes pulse{0%,100%{opacity:.5;}50%{opacity:1;}}
.ic-btns{display:flex;gap:30px;margin-top:6px;}
.icb{width:58px;height:58px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .15s;}
.icb:active{transform:scale(.9);}
.icb.dec{background:#ffeaea;color:var(--danger);}
.icb.acc{background:#e8f5e9;color:#2e7d32;}

/* ═══════════════════════════════════════════
   LOGOUT CONFIRM
══════════════════════════════════════════════*/
#logoutModal{position:fixed;inset:0;z-index:300;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);}
#logoutModal.show{display:flex;}
.lm-card{background:var(--surface);border-radius:24px;padding:28px 24px;width:280px;display:flex;flex-direction:column;gap:12px;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.lm-title{font-size:17px;font-weight:700;}
.lm-desc{font-size:13px;color:var(--sub);line-height:1.5;}
.lm-btns{display:flex;gap:10px;margin-top:6px;}
.lm-cancel{flex:1;padding:12px;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;color:var(--text);}
.lm-confirm{flex:1;padding:12px;background:var(--danger);border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;color:#fff;}

/* TOAST */
.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%) translateY(16px);background:rgba(20,20,20,.9);color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;opacity:0;transition:all .25s;pointer-events:none;z-index:999;white-space:nowrap;backdrop-filter:blur(10px);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* SCROLLBAR */
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>
<body>

<!-- ═══ LOGIN ═══ -->
<div class="screen active" id="loginScreen">
  <div class="login-logo">Venu</div>
  <p class="login-sub">Chat · Voice Call · Video Call</p>
  <div class="login-card">
    <div class="field">
      <label>Your Name</label>
      <input type="text" id="nameInp" placeholder="Enter your full name" autocomplete="off"/>
    </div>
    <div class="field">
      <label>Phone Number</label>
      <input type="tel" id="phoneInp" placeholder="10-digit number" maxlength="10" inputmode="numeric"/>
    </div>
    <button class="btn-grad" onclick="login()">Get Started →</button>
    <p class="err" id="loginErr"></p>
  </div>
</div>

<!-- ═══ HOME ═══ -->
<div class="screen" id="homeScreen">
  <div class="topbar">
    <span class="topbar-title">Venu</span>
    <div class="topbar-right">
      <button class="logout-btn" onclick="showLogout()">Logout</button>
      <button class="avatar-btn" id="myAvBtn"></button>
    </div>
  </div>
  <div class="search-box">
    <div class="search-row">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="tel" id="findInp" placeholder="Search by phone number..." maxlength="10" inputmode="numeric"/>
      <button class="find-btn" onclick="findUser()">Find</button>
    </div>
  </div>
  <div class="found-card" id="foundCard">
    <div class="fa-av" id="fAv"></div>
    <div class="fa-info">
      <div class="fa-name" id="fName"></div>
      <div class="fa-phone" id="fPhone"></div>
      <div class="fa-status" id="fStatus"></div>
    </div>
    <button class="chat-btn" onclick="openChat(foundUser)">Message</button>
  </div>
  <div class="sec-title">Chats</div>
  <div class="chat-list" id="chatList">
    <div class="empty-st">
      <svg width="52" height="52" fill="none" stroke="currentColor" stroke-width="1.3" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <p>Find a friend by phone number<br>to start chatting!</p>
    </div>
  </div>
</div>

<!-- ═══ CHAT ═══ -->
<div class="screen" id="chatScreen">
  <div class="chat-topbar">
    <button class="back-btn" onclick="goHome()">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <div class="ct-av" id="ctAv"></div>
    <div class="ct-info">
      <div class="ct-name" id="ctName"></div>
      <div class="ct-status" id="ctStatus">offline</div>
    </div>
    <div class="call-btns">
      <button class="cbtn vc" onclick="startCall('voice')" title="Voice Call">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      </button>
      <button class="cbtn vid" onclick="startCall('video')" title="Video Call">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
      </button>
    </div>
  </div>
  <div class="enc-bar">
    <svg width="10" height="10" fill="currentColor" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    Messages are end-to-end encrypted
  </div>
  <div class="messages" id="messages">
    <div class="typing-wrap" id="typingWrap">
      <div class="td"></div><div class="td"></div><div class="td"></div>
    </div>
  </div>
  <div class="input-bar">
    <textarea class="msg-inp" id="msgInp" placeholder="Message..." rows="1"
      oninput="onType()" onkeydown="onKey(event)"></textarea>
    <button class="send-btn" onclick="sendMsg()">
      <svg width="17" height="17" fill="none" stroke="#fff" stroke-width="2.5" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

<!-- ═══ CALL SCREEN ═══ -->
<div id="callScreen">
  <video id="remoteVideo" autoplay playsinline></video>
  <video id="localVideo" autoplay playsinline muted></video>
  <div class="call-top">
    <div class="call-av" id="callAv"></div>
    <div class="call-name" id="callName"></div>
    <div class="call-type-badge" id="callTypeBadge">📞 Voice Call</div>
    <div class="call-st" id="callSt">Calling...</div>
    <div class="call-timer" id="callTimer"></div>
  </div>
  <div class="call-ctrl">
    <button class="cc mute" id="muteBtn" onclick="toggleMute()" title="Mute">
      <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
    </button>
    <button class="cc end" onclick="endCall()" title="End Call">
      <svg width="26" height="26" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.42 19.42 0 0 1-3.45-2.93m-2.4-3.87A19.79 19.79 0 0 1 2.14 4.93 2 2 0 0 1 4.11 2.76h3A2 2 0 0 1 9.09 4.5c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8 10.69"/><line x1="23" y1="1" x2="1" y2="23"/></svg>
    </button>
    <button class="cc cam" id="camBtn" onclick="toggleCam()" title="Camera" style="display:none">
      <svg width="21" height="21" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
    </button>
    <button class="cc spk" id="spkBtn" onclick="toggleSpeaker()" title="Speaker">
      <svg width="21" height="21" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
    </button>
  </div>
</div>

<!-- ═══ INCOMING CALL ═══ -->
<div id="incomingPanel">
  <div class="ic-card">
    <div class="ic-type" id="icType">Voice Call</div>
    <div class="ic-av" id="icAv"></div>
    <div class="ic-name" id="icName"></div>
    <div class="ic-pulse">● Incoming...</div>
    <div class="ic-btns">
      <button class="icb dec" onclick="declineCall()">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <button class="icb acc" onclick="acceptCall()">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- ═══ LOGOUT CONFIRM ═══ -->
<div id="logoutModal">
  <div class="lm-card">
    <div class="lm-title">Logout?</div>
    <div class="lm-desc">உங்க chat history delete ஆகாது. மீண்டும் login பண்ணினா திரும்பவும் பாக்கலாம்.</div>
    <div class="lm-btns">
      <button class="lm-cancel" onclick="hideLogout()">Cancel</button>
      <button class="lm-confirm" onclick="doLogout()">Logout</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════
const SERVER  = "https://venu-server.onrender.com";
const WS_URL  = "wss://venu-server.onrender.com/ws";
const ICE_CFG = {
  iceServers:[
    {urls:"stun:stun.l.google.com:19302"},
    {urls:"stun:stun1.l.google.com:19302"},
    {urls:"stun:stun2.l.google.com:19302"},
    {urls:"stun:stun.cloudflare.com:3478"}
  ]
};

// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
let myToken=null,myUserId=null,myName=null,myPhone=null;
let ws=null,wsRetry=0,currentPeer=null,foundUser=null;
let chats={};  // { userId: { name, phone, userId, online, messages:[] } }
let typingTimers={},typeDebounce=null;
let pc=null,localStream=null,callType=null,isInCall=false;
let pendingOffer=null,pendingFrom=null,pendingCallType=null;
let callInterval=null,callSecs=0;
let muteOn=false,camOff=false,spkOn=false;

// ═══════════════════════════════════════════════════════
//  PREVENT ACCIDENTAL CLOSE
// ═══════════════════════════════════════════════════════
window.addEventListener('beforeunload', e => {
  if(myToken){
    e.preventDefault();
    e.returnValue = 'Venu is running. Are you sure you want to leave?';
    return e.returnValue;
  }
});

// Back button — don't close, go home
window.addEventListener('popstate', e => {
  if(document.getElementById('chatScreen').classList.contains('active')){
    e.preventDefault(); goHome();
  } else { history.pushState(null,'',location.href); }
});
history.pushState(null,'',location.href);

// ═══════════════════════════════════════════════════════
//  LOCALSTORAGE  (Persist messages & session)
// ═══════════════════════════════════════════════════════
function saveSession(){
  try{ localStorage.setItem('venu_session', JSON.stringify({myToken,myUserId,myName,myPhone})); }catch(e){}
}
function loadSession(){
  try{
    const s=localStorage.getItem('venu_session');
    if(!s) return false;
    const d=JSON.parse(s);
    if(!d.myToken) return false;
    myToken=d.myToken; myUserId=d.myUserId; myName=d.myName; myPhone=d.myPhone;
    return true;
  }catch(e){ return false; }
}
function clearSession(){ try{ localStorage.removeItem('venu_session'); }catch(e){} }

function saveChats(){
  try{ localStorage.setItem('venu_chats_'+myPhone, JSON.stringify(chats)); }catch(e){}
}
function loadChats(){
  try{
    const s=localStorage.getItem('venu_chats_'+myPhone);
    if(s){ chats=JSON.parse(s); }
  }catch(e){ chats={}; }
}

// ═══════════════════════════════════════════════════════
//  BOOT — auto-login if session exists
// ═══════════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', ()=>{
  if(loadSession()){
    loadChats();
    document.getElementById('myAvBtn').textContent = myName[0].toUpperCase();
    renderChatList();
    showScreen('homeScreen');
    connectWS();
  }
});

// ═══════════════════════════════════════════════════════
//  LOGIN
// ═══════════════════════════════════════════════════════
async function login(){
  const name  = document.getElementById('nameInp').value.trim();
  const phone = document.getElementById('phoneInp').value.replace(/\D/g,'');
  const errEl = document.getElementById('loginErr');
  errEl.textContent='';
  if(!name)           { errEl.textContent='Please enter your name'; return; }
  if(phone.length<10) { errEl.textContent='Enter a valid 10-digit number'; return; }
  try{
    const r=await fetch(SERVER+'/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,phone})});
    const d=await r.json();
    if(!r.ok){ errEl.textContent=d.error||'Login failed'; return; }
    myToken=d.token; myUserId=d.userId; myName=d.name; myPhone=d.phone;
    saveSession();
    loadChats();
    document.getElementById('myAvBtn').textContent=myName[0].toUpperCase();
    renderChatList();
    showScreen('homeScreen');
    connectWS();
  }catch(e){ errEl.textContent='Cannot reach server. Try again.'; }
}

// ═══════════════════════════════════════════════════════
//  LOGOUT
// ═══════════════════════════════════════════════════════
function showLogout(){ document.getElementById('logoutModal').classList.add('show'); }
function hideLogout(){ document.getElementById('logoutModal').classList.remove('show'); }
function doLogout(){
  hideLogout();
  if(ws){ ws.onclose=null; ws.close(); ws=null; }
  clearSession();
  chats={};
  myToken=myUserId=myName=myPhone=currentPeer=null;
  showScreen('loginScreen');
  document.getElementById('nameInp').value='';
  document.getElementById('phoneInp').value='';
  document.getElementById('chatList').innerHTML = emptyStateHTML();
}

function emptyStateHTML(){
  return `<div class="empty-st"><svg width="52" height="52" fill="none" stroke="currentColor" stroke-width="1.3" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><p>Find a friend by phone number<br>to start chatting!</p></div>`;
}

// ═══════════════════════════════════════════════════════
//  WEBSOCKET
// ═══════════════════════════════════════════════════════
function connectWS(){
  if(ws && ws.readyState<2) return;
  ws=new WebSocket(WS_URL);
  ws.onopen=()=>{ wsRetry=0; ws.send(JSON.stringify({type:'auth',token:myToken})); };
  ws.onmessage=e=>{
    let msg; try{ msg=JSON.parse(e.data); }catch{ return; }
    switch(msg.type){
      case 'auth_ok':        showToast('Connected ✓'); break;
      case 'message':        onMessage(msg); break;
      case 'typing':         onTyping(msg); break;
      case 'presence':       onPresence(msg); break;
      case 'offer':          onOffer(msg); break;
      case 'answer':         onAnswer(msg); break;
      case 'ice_candidate':  onIce(msg); break;
    }
  };
  ws.onclose=()=>{
    const delay=Math.min(1000*Math.pow(2,wsRetry++),30000);
    setTimeout(()=>{ if(myToken) connectWS(); }, delay);
  };
  ws.onerror=()=>{ ws.close(); };
  // keepalive
  setInterval(()=>{ if(ws?.readyState===1) ws.send(JSON.stringify({type:'ping'})); },25000);
}

function wsSend(data){ if(ws?.readyState===1) ws.send(JSON.stringify(data)); }

// ═══════════════════════════════════════════════════════
//  FIND USER
// ═══════════════════════════════════════════════════════
async function findUser(){
  const phone=document.getElementById('findInp').value.replace(/\D/g,'');
  if(phone.length<10){ showToast('Enter 10-digit number'); return; }
  if(phone===myPhone){ showToast("That's your own number!"); return; }
  try{
    const r=await fetch(SERVER+'/users/find',{method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+myToken},
      body:JSON.stringify({phone})});
    const d=await r.json();
    if(!r.ok){ showToast(d.error||'User not found'); document.getElementById('foundCard').classList.remove('show'); return; }
    foundUser=d;
    document.getElementById('fAv').textContent=d.name[0].toUpperCase();
    document.getElementById('fName').textContent=d.name;
    document.getElementById('fPhone').textContent=d.phone;
    const st=document.getElementById('fStatus');
    st.textContent=d.online?'● Online':'○ Offline';
    st.className='fa-status '+(d.online?'on':'off');
    document.getElementById('foundCard').classList.add('show');
  }catch(e){ showToast('Network error'); }
}

// ═══════════════════════════════════════════════════════
//  CHAT
// ═══════════════════════════════════════════════════════
function openChat(user){
  if(!user) return;
  currentPeer=user;
  if(!chats[user.userId]) chats[user.userId]={...user,messages:[],online:user.online||false};
  document.getElementById('ctAv').textContent=user.name[0].toUpperCase();
  document.getElementById('ctName').textContent=user.name;
  updateChatStatus();
  renderMessages();
  showScreen('chatScreen');
  document.getElementById('foundCard').classList.remove('show');
  document.getElementById('findInp').value='';
  saveChats();
  renderChatList();
  setTimeout(()=>{ const m=document.getElementById('messages'); m.scrollTop=m.scrollHeight; },50);
}

function updateChatStatus(){
  if(!currentPeer) return;
  const isOn=chats[currentPeer.userId]?.online||false;
  const el=document.getElementById('ctStatus');
  el.textContent=isOn?'Active now':'Offline';
  el.className='ct-status '+(isOn?'on':'');
}

function onMessage(msg){
  const uid=msg.from;
  if(!chats[uid]) chats[uid]={name:msg.fromName,phone:msg.fromPhone,userId:uid,messages:[],online:true};
  chats[uid].messages.push({from:'them',text:msg.text,time:Date.now()});
  saveChats();
  if(currentPeer?.userId===uid){ renderMessages(); }
  renderChatList();
}

function onTyping(msg){
  if(currentPeer?.userId===msg.from){
    const tw=document.getElementById('typingWrap');
    tw.classList.add('show');
    clearTimeout(typingTimers[msg.from]);
    typingTimers[msg.from]=setTimeout(()=>tw.classList.remove('show'),2500);
  }
}

function onPresence(msg){
  if(chats[msg.userId]) chats[msg.userId].online=msg.online;
  if(currentPeer?.userId===msg.userId){ currentPeer.online=msg.online; updateChatStatus(); }
  renderChatList();
}

function onType(){
  const ta=document.getElementById('msgInp');
  ta.style.height='auto';
  ta.style.height=Math.min(ta.scrollHeight,100)+'px';
  clearTimeout(typeDebounce);
  typeDebounce=setTimeout(()=>{ if(currentPeer) wsSend({type:'typing',to:currentPeer.userId}); },400);
}

function onKey(e){ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendMsg(); } }

function sendMsg(){
  const inp=document.getElementById('msgInp');
  const text=inp.value.trim();
  if(!text||!currentPeer) return;
  const tempId=Date.now().toString();
  wsSend({type:'message',to:currentPeer.userId,text,tempId});
  if(!chats[currentPeer.userId]) chats[currentPeer.userId]={...currentPeer,messages:[],online:false};
  chats[currentPeer.userId].messages.push({from:'me',text,time:Date.now()});
  saveChats();
  inp.value=''; inp.style.height='auto';
  renderMessages();
  renderChatList();
}

function renderMessages(){
  const c=chats[currentPeer?.userId];
  const el=document.getElementById('messages');
  const tw=document.getElementById('typingWrap');
  el.innerHTML='';
  el.appendChild(tw);
  (c?.messages||[]).forEach(m=>{
    const w=document.createElement('div');
    w.className='msg-wrap '+(m.from==='me'?'me':'them');
    const b=document.createElement('div'); b.className='bubble'; b.textContent=m.text;
    const meta=document.createElement('div'); meta.className='msg-meta';
    const d=new Date(m.time);
    const ts=d.getHours()+':'+String(d.getMinutes()).padStart(2,'0');
    meta.innerHTML=ts+(m.from==='me'?'<span class="tick">✓✓</span>':'');
    w.appendChild(b); w.appendChild(meta); el.appendChild(w);
  });
  el.scrollTop=el.scrollHeight;
}

function renderChatList(){
  const el=document.getElementById('chatList');
  const keys=Object.keys(chats).filter(k=>chats[k].messages?.length>0||k===currentPeer?.userId);
  if(!keys.length){ el.innerHTML=emptyStateHTML(); return; }
  el.innerHTML=keys.map(uid=>{
    const c=chats[uid];
    const msgs=c.messages||[];
    const last=msgs[msgs.length-1];
    const preview=last?(last.from==='me'?'You: ':c.name.split(' ')[0]+': ')+last.text:'Tap to chat';
    const d=last?new Date(last.time):null;
    const ts=d?d.getHours()+':'+String(d.getMinutes()).padStart(2,'0'):'';
    return `<div class="chat-item" onclick="openChat(chats['${uid}'])">
      <div class="ci-av">${c.name[0].toUpperCase()}${c.online?'<div class="ci-dot"></div>':''}</div>
      <div class="ci-info">
        <div class="ci-name">${c.name}</div>
        <div class="ci-last">${preview.slice(0,40)}</div>
      </div>
      <div class="ci-right"><span class="ci-time">${ts}</span></div>
    </div>`;
  }).join('');
}

function goHome(){ currentPeer=null; showScreen('homeScreen'); renderChatList(); }

// ═══════════════════════════════════════════════════════
//  WEBRTC — CALL INITIATION
// ═══════════════════════════════════════════════════════
async function startCall(type){
  if(!currentPeer){ showToast('Open a chat first'); return; }
  if(isInCall){ showToast('Already in a call'); return; }
  callType=type;
  openCallScreen(currentPeer, type, 'Calling...');

  try{
    const constraints = type==='video' ? {video:{facingMode:'user'},audio:true} : {audio:true,video:false};
    localStream = await navigator.mediaDevices.getUserMedia(constraints);
  } catch(e){
    try{ localStream = await navigator.mediaDevices.getUserMedia({audio:true,video:false}); }
    catch(e2){ showToast('Mic/Camera access denied'); endCall(); return; }
    if(type==='video') showToast('Camera not available, voice only');
  }

  setupLocalVideo(type);
  buildPC(currentPeer.userId);
  localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));
  const offer=await pc.createOffer({offerToReceiveAudio:true,offerToReceiveVideo:type==='video'});
  await pc.setLocalDescription(offer);
  wsSend({type:'offer',to:currentPeer.userId,sdp:offer,callType:type});
}

// ═══════════════════════════════════════════════════════
//  WEBRTC — RECEIVE OFFER
// ═══════════════════════════════════════════════════════
function onOffer(msg){
  if(isInCall){ wsSend({type:'answer',to:msg.from,sdp:null}); return; }
  pendingOffer=msg.sdp; pendingFrom=msg.from; pendingCallType=msg.callType||'voice';
  const caller=chats[msg.from]||{name:msg.fromName||'Unknown',userId:msg.from};
  document.getElementById('icAv').textContent=caller.name[0].toUpperCase();
  document.getElementById('icName').textContent=caller.name;
  document.getElementById('icType').textContent=pendingCallType==='video'?'📹 Video Call':'📞 Voice Call';
  document.getElementById('incomingPanel').classList.add('show');
}

async function acceptCall(){
  document.getElementById('incomingPanel').classList.remove('show');
  callType=pendingCallType;
  const caller=chats[pendingFrom]||{name:'Unknown',userId:pendingFrom};
  openCallScreen(caller, callType, 'Connecting...');

  try{
    const constraints = callType==='video'?{video:{facingMode:'user'},audio:true}:{audio:true,video:false};
    localStream=await navigator.mediaDevices.getUserMedia(constraints);
  } catch(e){
    try{ localStream=await navigator.mediaDevices.getUserMedia({audio:true,video:false}); }
    catch(e2){ showToast('Mic access denied'); endCall(); return; }
  }

  setupLocalVideo(callType);
  buildPC(pendingFrom);
  localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));
  await pc.setRemoteDescription(new RTCSessionDescription(pendingOffer));
  const answer=await pc.createAnswer();
  await pc.setLocalDescription(answer);
  wsSend({type:'answer',to:pendingFrom,sdp:answer,callType});
}

function declineCall(){
  document.getElementById('incomingPanel').classList.remove('show');
  pendingOffer=null; pendingFrom=null;
}

async function onAnswer(msg){
  if(!pc||!msg.sdp) return;
  try{ await pc.setRemoteDescription(new RTCSessionDescription(msg.sdp)); }catch(e){}
}

async function onIce(msg){
  if(pc&&msg.candidate){
    try{ await pc.addIceCandidate(new RTCIceCandidate(msg.candidate)); }catch(e){}
  }
}

// ═══════════════════════════════════════════════════════
//  WEBRTC — HELPERS
// ═══════════════════════════════════════════════════════
function buildPC(peerId){
  if(pc){ pc.close(); }
  pc=new RTCPeerConnection(ICE_CFG);
  pc.onicecandidate=e=>{ if(e.candidate) wsSend({type:'ice_candidate',to:peerId,candidate:e.candidate}); };
  pc.onconnectionstatechange=()=>{
    if(pc.connectionState==='connected'){
      document.getElementById('callSt').textContent='Connected';
      startCallTimer();
    } else if(pc.connectionState==='failed'||pc.connectionState==='disconnected'){
      showToast('Call disconnected'); endCall();
    }
  };
  pc.ontrack=e=>{
    const rv=document.getElementById('remoteVideo');
    rv.srcObject=e.streams[0];
    if(callType==='video') rv.style.display='block';
    document.getElementById('callSt').textContent='Connected';
    startCallTimer();
  };
}

function setupLocalVideo(type){
  if(type==='video' && localStream.getVideoTracks().length>0){
    const lv=document.getElementById('localVideo');
    lv.srcObject=localStream; lv.style.display='block';
    document.getElementById('camBtn').style.display='flex';
  }
}

function openCallScreen(user, type, status){
  isInCall=true;
  muteOn=false; camOff=false;
  document.getElementById('callAv').textContent=user.name[0].toUpperCase();
  document.getElementById('callName').textContent=user.name;
  document.getElementById('callTypeBadge').textContent=type==='video'?'📹 Video Call':'📞 Voice Call';
  document.getElementById('callSt').textContent=status;
  document.getElementById('callTimer').style.display='none';
  document.getElementById('remoteVideo').style.display='none';
  document.getElementById('localVideo').style.display='none';
  document.getElementById('camBtn').style.display='none';
  document.getElementById('muteBtn').classList.remove('on');
  document.getElementById('camBtn').classList.remove('on');
  document.getElementById('callScreen').classList.add('show');
}

function endCall(){
  isInCall=false;
  clearInterval(callInterval); callInterval=null; callSecs=0;
  if(pc){ pc.close(); pc=null; }
  if(localStream){ localStream.getTracks().forEach(t=>t.stop()); localStream=null; }
  document.getElementById('callScreen').classList.remove('show');
  document.getElementById('remoteVideo').srcObject=null;
  document.getElementById('localVideo').srcObject=null;
}

function startCallTimer(){
  if(callInterval) return;
  callSecs=0;
  document.getElementById('callTimer').style.display='block';
  callInterval=setInterval(()=>{
    callSecs++;
    const m=Math.floor(callSecs/60), s=callSecs%60;
    document.getElementById('callTimer').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  },1000);
}

function toggleMute(){
  muteOn=!muteOn;
  localStream?.getAudioTracks().forEach(t=>t.enabled=!muteOn);
  document.getElementById('muteBtn').classList.toggle('on',muteOn);
  showToast(muteOn?'🔇 Muted':'🎙 Unmuted');
}

function toggleCam(){
  camOff=!camOff;
  localStream?.getVideoTracks().forEach(t=>t.enabled=!camOff);
  document.getElementById('camBtn').classList.toggle('on',camOff);
  showToast(camOff?'📵 Camera off':'📹 Camera on');
}

function toggleSpeaker(){
  spkOn=!spkOn;
  document.getElementById('spkBtn').classList.toggle('on',spkOn);
  showToast(spkOn?'🔊 Speaker on':'🔈 Earpiece');
}

// ═══════════════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════════════
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

let toastTmr=null;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTmr);
  toastTmr=setTimeout(()=>t.classList.remove('show'),2800);
}

// Enter key support
document.getElementById('phoneInp')?.addEventListener('keydown',e=>{ if(e.key==='Enter') login(); });
document.getElementById('findInp')?.addEventListener('keydown',e=>{ if(e.key==='Enter') findUser(); });
</script>
